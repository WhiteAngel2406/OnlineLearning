<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Bài viết - Marketing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 font-bold text-lg tracking-tight">
            <i class="ph-fill ph-rocket-launch text-indigo-600 mr-2 text-2xl"></i> Marketing Hub
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="/marketing/dashboard" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-squares-four text-lg mr-3"></i> Dashboard
            </a>
            <a href="/sliders" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-image text-lg mr-3"></i> Quản lý Slider
            </a>
            <a href="/marketing/blogs" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">
                <i class="ph ph-article text-lg mr-3"></i> Quản lý Bài viết
            </a>
        </nav>
        <div class="p-4 border-t border-slate-200">
            <a href="/" class="flex items-center text-sm font-medium text-slate-600 hover:text-slate-900">
                <i class="ph ph-arrow-left mr-2"></i> Về trang chủ
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <h1 class="text-xl font-semibold text-slate-800">Quản lý Bài viết</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-slate-500">Xin chào, Marketing Team!</span>
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">
                    M
                </div>
            </div>
        </header>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-slate-900">Tất cả bài viết</h3>
                    <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors flex items-center">
                        <i class="ph ph-plus mr-2"></i> Tạo bài viết
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                            <tr>
                                <th class="px-6 py-3 font-medium">ID</th>
                                <th class="px-6 py-3 font-medium">Tiêu đề</th>
                                <th class="px-6 py-3 font-medium">Tác Giả</th>
                                <th class="px-6 py-3 font-medium">Trạng Thái</th>
                                <th class="px-6 py-3 font-medium">Ngày Tạo</th>
                                <th class="px-6 py-3 font-medium text-right">Thao Tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr th:each="blog : ${blogs}" class="hover:bg-slate-50">
                                <td class="px-6 py-4 font-medium text-slate-900" th:text="${blog.id}">1</td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-lg bg-slate-100 overflow-hidden shrink-0 border border-slate-200">
                                            <img th:if="${blog.thumbnail != null}" th:src="@{'/uploads/' + ${blog.thumbnail}}" class="w-full h-full object-cover">
                                            <div th:unless="${blog.thumbnail != null}" class="w-full h-full flex items-center justify-center text-slate-400">
                                                <i class="ph ph-image text-xl"></i>
                                            </div>
                                        </div>
                                        <p class="font-medium text-slate-900 line-clamp-2 max-w-md" th:title="${blog.title}" th:text="${blog.title}">Blog Title</p>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-slate-600" th:text="${blog.author != null ? blog.author.fullName : 'Ẩn danh'}">Author</td>
                                <td class="px-6 py-4">
                                    <span th:if="${blog.status == 'PUBLISHED'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200">
                                        Đã xuất bản
                                    </span>
                                    <span th:if="${blog.status == 'DRAFT'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-800 border border-slate-200">
                                        Bản nháp
                                    </span>
                                    <span th:if="${blog.status == 'HIDDEN'}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-rose-100 text-rose-800 border border-rose-200">
                                        Đã ẩn
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-slate-500" th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy')}">Date</td>
                                <td class="px-6 py-4 text-right">
                                    <a th:href="@{'/marketing/blogs/' + ${blog.id}}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition-colors" title="Xem chi tiết">
                                        <i class="ph ph-eye text-lg"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(blogs)}">
                                <td colspan="6" class="px-6 py-8 text-center text-slate-500">
                                    <div class="flex flex-col items-center justify-center">
                                        <i class="ph ph-article text-4xl text-slate-300 mb-2"></i>
                                        <p>Chưa có bài viết nào</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
