<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Slider - Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 font-bold text-lg tracking-tight">
            <i class="ph-fill ph-rocket-launch text-indigo-600 mr-2 text-2xl"></i> Marketing Hub
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="/marketing/dashboard" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-squares-four text-lg mr-3"></i> Dashboard
            </a>
            <a href="/marketing/sliders" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">
                <i class="ph ph-image text-lg mr-3"></i> Quản lý Slider
            </a>
            <a href="/marketing/blogs" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-article text-lg mr-3"></i> Quản lý Bài viết
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center">
                <a href="/marketing/sliders" class="text-slate-500 hover:text-slate-700 mr-4">
                    <i class="ph ph-arrow-left text-xl"></i>
                </a>
                <h1 class="text-xl font-semibold text-slate-800">Chi tiết Slider</h1>
            </div>
            <div class="flex items-center gap-3">
                <span th:if="${slider.status == 'PENDING'}" class="px-3 py-1 text-sm font-medium rounded-full bg-yellow-100 text-yellow-800 border border-yellow-200">
                    <i class="ph ph-clock mr-1"></i> Chờ duyệt
                </span>
                <span th:if="${slider.status == 'SHOW'}" class="px-3 py-1 text-sm font-medium rounded-full bg-green-100 text-green-800 border border-green-200">
                    <i class="ph ph-check-circle mr-1"></i> Đang hiển thị
                </span>
                <span th:if="${slider.status == 'HIDE'}" class="px-3 py-1 text-sm font-medium rounded-full bg-slate-100 text-slate-800 border border-slate-200">
                    <i class="ph ph-eye-slash mr-1"></i> Đã ẩn
                </span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <!-- Image Header -->
                <div class="w-full h-80 bg-slate-100 relative group border-b border-slate-200">
                    <img th:if="${slider.imageUrl != null}" th:src="${slider.imageUrl}" class="w-full h-full object-cover">
                    <div th:unless="${slider.imageUrl != null}" class="w-full h-full flex flex-col items-center justify-center text-slate-400">
                        <i class="ph ph-image text-5xl mb-2"></i>
                        <span>Không có hình ảnh</span>
                    </div>
                </div>

                <!-- Info Section -->
                <div class="p-8 space-y-8">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900 mb-2" th:text="${slider.title}">Tiêu đề Slider</h2>
                        <p class="text-slate-500 text-sm flex items-center">
                            <i class="ph ph-user mr-1"></i> Tạo bởi: 
                            <span class="ml-1 font-medium text-slate-700" th:text="${slider.user != null ? slider.user.fullName : 'Hệ thống'}">Author</span>
                        </p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Đường dẫn đính kèm (Link URL)</h3>
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 flex items-center justify-between">
                                <span class="text-slate-700 truncate mr-4" th:text="${slider.linkUrl}">https://example.com/link</span>
                                <a th:if="${slider.linkUrl != null and !slider.linkUrl.isEmpty()}" th:href="${slider.linkUrl}" target="_blank" class="text-indigo-600 hover:text-indigo-800 shrink-0">
                                    <i class="ph ph-arrow-square-out text-lg"></i>
                                </a>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Mô tả</h3>
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 min-h-[56px]">
                                <span class="text-slate-700" th:text="${slider.description ?: 'Không có mô tả'}">Description</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
