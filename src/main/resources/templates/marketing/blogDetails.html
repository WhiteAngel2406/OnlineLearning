<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Bài viết - Marketing</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 font-bold text-lg tracking-tight">
            <i class="ph-fill ph-rocket-launch text-indigo-600 mr-2 text-2xl"></i> Marketing Hub
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="/marketing/sliders"
                class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-squares-four text-lg mr-3"></i> Dashboard
            </a>
            <a href="/sliders"
                class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-image text-lg mr-3"></i> Quản lý Slider
            </a>
            <a href="/marketing/blogs"
                class="flex items-center px-3 py-2 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">
                <i class="ph ph-article text-lg mr-3"></i> Quản lý Bài viết
            </a>
        </nav>
        <div class="p-4 border-t border-slate-200">
            <a href="/" class="flex items-center text-sm font-medium text-slate-600 hover:text-slate-900">
                <i class="ph ph-arrow-left mr-2"></i> Về trang chủ
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <!-- Top Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4">
                <a href="/marketing/blogs"
                    class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 transition-colors">
                    <i class="ph ph-arrow-left text-lg"></i>
                </a>
                <h1 class="text-xl font-semibold text-slate-800">Chi tiết Bài viết</h1>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-slate-500">Xin chào, Marketing Team!</span>
                <div
                    class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">
                    M
                </div>
            </div>
        </header>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto">
                <!-- Action Bar -->
                <div class="flex justify-between items-center mb-6">
                    <a href="/marketing/blogs"
                        class="text-sm font-medium text-slate-500 hover:text-indigo-600 flex items-center transition-colors">
                        <i class="ph ph-arrow-left mr-2"></i> Quay lại danh sách
                    </a>
                    <div class="flex gap-3">
                        <button
                            class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors flex items-center">
                            <i class="ph ph-pencil-simple mr-2"></i> Chỉnh sửa
                        </button>
                    </div>
                </div>

                <!-- Blog Content Card -->
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <!-- Thumbnail -->
                    <div class="w-full h-[400px] bg-slate-100 relative">
                        <img th:if="${blog.thumbnail != null}" th:src="@{'/uploads/' + ${blog.thumbnail}}"
                            class="w-full h-full object-cover">
                        <div th:unless="${blog.thumbnail != null}"
                            class="absolute inset-0 flex items-center justify-center text-slate-300">
                            <i class="ph ph-image text-6xl"></i>
                        </div>
                    </div>

                    <div class="p-8 md:p-12">
                        <!-- Metadata -->
                        <div class="flex flex-wrap items-center gap-4 mb-6 text-sm">
                            <span th:if="${blog.status == 'PUBLISHED'}"
                                class="inline-flex items-center px-2.5 py-1 rounded-full font-medium bg-emerald-100 text-emerald-800">
                                Đã xuất bản
                            </span>
                            <span th:if="${blog.status == 'DRAFT'}"
                                class="inline-flex items-center px-2.5 py-1 rounded-full font-medium bg-slate-100 text-slate-800">
                                Bản nháp
                            </span>
                            <span th:if="${blog.status == 'HIDDEN'}"
                                class="inline-flex items-center px-2.5 py-1 rounded-full font-medium bg-rose-100 text-rose-800">
                                Đã ẩn
                            </span>
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                            <span class="text-indigo-600 font-semibold"
                                th:text="${blog.blogCategory != null ? blog.blogCategory.name : 'Không phân loại'}">Category</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                            <span class="text-slate-500 flex items-center">
                                <i class="ph ph-user mr-1.5"></i>
                                <span th:text="${blog.author != null ? blog.author.fullName : 'Ẩn danh'}">Tác giả</span>
                            </span>
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                            <span class="text-slate-500 flex items-center">
                                <i class="ph ph-calendar-blank mr-1.5"></i>
                                <span th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày
                                    đăng</span>
                            </span>
                        </div>

                        <!-- Title -->
                        <h2 class="text-3xl md:text-4xl font-bold text-slate-900 mb-6 leading-tight"
                            th:text="${blog.title}">
                            Tiêu đề bài viết
                        </h2>

                        <p class="text-lg text-slate-600 mb-8 leading-relaxed font-medium"
                            th:text="${blog.shortDescription}">
                            Mô tả ngắn gọn về bài viết...
                        </p>

                        <hr class="border-slate-200 mb-8">

                        <!-- Content -->
                        <div class="prose prose-slate prose-lg max-w-none prose-img:rounded-xl prose-a:text-indigo-600"
                            th:utext="${blog.content}">
                            Nội dung chi tiết bài viết...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
