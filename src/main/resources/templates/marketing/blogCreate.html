<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đề xuất Bài viết - Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- TinyMCE for rich text editor -->
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
      tinymce.init({
        selector: '#content',
        height: 400,
        plugins: 'advlist autolink lists link image charmap preview anchor pagebreak searchreplace wordcount visualblocks visualchars code fullscreen insertdatetime media nonbreaking table emoticons template help',
        toolbar: 'undo redo | styles | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image | print preview media | forecolor backcolor emoticons',
        menubar: 'file edit view insert format tools table help',
        content_style: 'body { font-family:Inter,sans-serif; font-size:16px }',
        setup: function (editor) {
            editor.on('change keyup', function () {
                editor.save();
            });
        }
      });
    </script>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-slate-200 font-bold text-lg tracking-tight">
            <i class="ph-fill ph-rocket-launch text-indigo-600 mr-2 text-2xl"></i> Marketing Hub
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="/marketing/dashboard" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-squares-four text-lg mr-3"></i> Dashboard
            </a>
            <a href="/marketing/sliders" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg text-slate-700 hover:bg-slate-100">
                <i class="ph ph-image text-lg mr-3"></i> Quản lý Slider
            </a>
            <a href="/marketing/blogs" class="flex items-center px-3 py-2 text-sm font-medium rounded-lg bg-indigo-50 text-indigo-700">
                <i class="ph ph-article text-lg mr-3"></i> Quản lý Bài viết
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center px-8 shrink-0">
            <a href="/marketing/blogs" class="text-slate-500 hover:text-slate-700 mr-4">
                <i class="ph ph-arrow-left text-xl"></i>
            </a>
            <h1 class="text-xl font-semibold text-slate-800">Đề xuất Bài viết Mới</h1>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-8 rounded-r-lg">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i class="ph-fill ph-info text-blue-500 text-xl"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-blue-700">
                                Bài viết sau khi tạo sẽ được lưu dưới dạng <strong>Bản nháp (DRAFT)</strong>. Quản trị viên (Admin) sẽ kiểm duyệt nội dung trước khi xuất bản công khai.
                            </p>
                        </div>
                    </div>
                </div>

                <form th:action="@{/marketing/blogs/create}" method="post" enctype="multipart/form-data" class="space-y-6">
                    <div>
                        <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Tiêu đề bài viết <span class="text-red-500">*</span></label>
                        <input type="text" id="title" name="title" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                    </div>
                    
                    <div>
                        <label for="categoryId" class="block text-sm font-medium text-slate-700 mb-1">Danh mục <span class="text-red-500">*</span></label>
                        <select id="categoryId" name="categoryId" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors bg-white">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div>
                        <label for="shortDescription" class="block text-sm font-medium text-slate-700 mb-1">Mô tả ngắn <span class="text-red-500">*</span></label>
                        <textarea id="shortDescription" name="shortDescription" required rows="3" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors"></textarea>
                    </div>

                    <div>
                        <label for="thumbnailFile" class="block text-sm font-medium text-slate-700 mb-1">Ảnh bìa (Thumbnail) <span class="text-red-500">*</span></label>
                        <input type="file" id="thumbnailFile" name="thumbnailFile" accept="image/*" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                    </div>

                    <div>
                        <label for="content" class="block text-sm font-medium text-slate-700 mb-1">Nội dung bài viết <span class="text-red-500">*</span></label>
                        <textarea id="content" name="content"></textarea>
                    </div>

                    <div class="pt-4 flex justify-end gap-3 border-t border-slate-200">
                        <a href="/marketing/blogs" class="px-5 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">Hủy</a>
                        <button type="submit" class="px-5 py-2 bg-indigo-600 rounded-lg text-sm font-medium text-white hover:bg-indigo-700 shadow-sm flex items-center gap-2">
                            <i class="ph ph-paper-plane-tilt"></i> Lưu Bản Nháp
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
