<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${slider.title} + ' - OELS'">Slider Detail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Premium Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 font-sans antialiased text-white selection:bg-indigo-500 selection:text-white">

<!-- Header -->
<div th:replace="~{components/header :: header}"></div>

<main class="relative min-h-screen pt-24 pb-24 flex items-center justify-center overflow-hidden">
    <!-- Blurred Background Image & Overlays -->
    <div class="absolute inset-0 z-0">
        <img th:if="${slider.imageUrl != null}" th:src="${slider.imageUrl}" class="w-full h-full object-cover blur-3xl scale-125 opacity-30" alt="">
        <div th:unless="${slider.imageUrl != null}" class="w-full h-full bg-gradient-to-br from-indigo-900 to-purple-900 opacity-30"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-zinc-950/80 via-zinc-950/60 to-zinc-950"></div>
        
        <!-- Decorative glowing orbs -->
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/30 rounded-full blur-[100px] mix-blend-screen"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/30 rounded-full blur-[100px] mix-blend-screen"></div>
    </div>

    <!-- Main Content Container -->
    <div class="relative z-10 w-full max-w-7xl mx-auto px-6 sm:px-12 lg:px-16">
        
        <!-- Breadcrumbs / Back button -->
        <div class="mb-8">
            <a href="/" class="inline-flex items-center text-zinc-400 hover:text-white transition-colors group text-sm font-medium uppercase tracking-widest">
                <i class="ph ph-arrow-left mr-2 text-lg group-hover:-translate-x-1 transition-transform"></i>
                Quay lại trang chủ
            </a>
        </div>

        <div class="bg-white/[0.03] backdrop-blur-2xl border border-white/[0.05] shadow-[0_8px_32px_rgba(0,0,0,0.4)] rounded-3xl overflow-hidden flex flex-col lg:flex-row ring-1 ring-white/10">
            
            <!-- Left: Image Area -->
            <div class="w-full lg:w-1/2 relative min-h-[300px] sm:min-h-[400px] lg:min-h-[600px] group">
                <img th:if="${slider.imageUrl != null}" th:src="${slider.imageUrl}" alt="Slider Feature"
                     class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                <div th:unless="${slider.imageUrl != null}" class="absolute inset-0 bg-zinc-900 flex items-center justify-center">
                    <i class="ph-fill ph-image text-8xl text-zinc-800"></i>
                </div>
                <!-- Image Overlay -->
                <div class="absolute inset-0 bg-gradient-to-t from-zinc-900/80 via-transparent to-transparent lg:hidden"></div>
            </div>

            <!-- Right: Content Area -->
            <div class="w-full lg:w-1/2 p-10 sm:p-14 lg:p-20 flex flex-col justify-center relative">
                
                <!-- Badge -->
                <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-zinc-300 text-xs font-semibold uppercase tracking-widest w-fit mb-8 shadow-inner">
                    <i class="ph-fill ph-sparkle text-amber-400 text-sm"></i>
                    Khám phá nội dung
                </div>

                <!-- Title & Description -->
                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-white tracking-tight leading-[1.1] mb-6"
                    th:text="${slider.title}">Tiêu đề nổi bật của Slider</h1>
                
                <p class="text-lg sm:text-xl text-zinc-400 leading-relaxed font-light mb-12"
                   th:text="${slider.description ?: 'Chưa có mô tả cho nội dung này.'}">Mô tả chi tiết và hấp dẫn về nội dung của slider để thu hút người dùng.</p>

                <!-- Metadata Grid -->
                <div class="grid grid-cols-2 gap-y-8 gap-x-12 mb-12 pt-8 border-t border-white/10">
                    <div>
                        <p class="text-zinc-500 text-xs uppercase tracking-widest font-semibold mb-2">Đăng bởi</p>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                                <i class="ph ph-user text-indigo-400 text-lg"></i>
                            </div>
                            <span class="text-white font-medium" th:text="${slider.user != null ? slider.user.fullName : 'Hệ thống'}">Admin</span>
                        </div>
                    </div>
                    
                    <div>
                        <p class="text-zinc-500 text-xs uppercase tracking-widest font-semibold mb-2">Ngày đăng</p>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-emerald-500/20 flex items-center justify-center border border-emerald-500/30">
                                <i class="ph ph-calendar-blank text-emerald-400 text-lg"></i>
                            </div>
                            <span class="text-white font-medium" th:text="${#temporals.format(slider.createdAt, 'dd/MM/yyyy')}">01/01/2025</span>
                        </div>
                    </div>

                    <div>
                        <p class="text-zinc-500 text-xs uppercase tracking-widest font-semibold mb-2">Lượt tương tác</p>
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-rose-500/20 flex items-center justify-center border border-rose-500/30">
                                <i class="ph ph-eye text-rose-400 text-lg"></i>
                            </div>
                            <span class="text-white font-medium"><span th:text="${slider.viewCount}">0</span> Lượt xem</span>
                        </div>
                    </div>
                </div>

                <!-- Call to Action -->
                <div class="flex flex-col sm:flex-row items-center gap-5 mt-auto">
                    <a th:if="${slider.linkUrl != null and !slider.linkUrl.isEmpty()}" th:href="${slider.linkUrl}" target="_blank"
                       class="w-full sm:w-auto px-8 py-4 bg-white text-zinc-950 rounded-full font-bold flex items-center justify-center gap-2 hover:bg-zinc-200 transition-all hover:scale-105 focus:ring-4 focus:ring-white/20 group no-underline">
                        Truy cập ngay
                        <i class="ph-bold ph-arrow-up-right text-lg group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                    </a>
                </div>

            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{components/footer :: footer}"></div>

</body>
</html>
