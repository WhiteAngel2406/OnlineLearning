<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${blog.title}">Chi tiết Bài viết</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Premium Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Anti-Emoji, High-end Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Tailwind CSS v3 CDN with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    boxShadow: {
                        'diffusion': '0 20px 40px -15px rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        /* Reset Bootstrap's aggressive link styling */
        a, a:hover {
            text-decoration: none !important;
            color: inherit;
        }
    </style>
    
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
</head>
<body class="bg-zinc-50 text-zinc-900 font-sans antialiased">

<!-- Header -->
<div th:replace="~{components/header :: header}"></div>

<main class="max-w-7xl mx-auto px-6 py-12 mb-16">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <!-- Main Content (8 cols) -->
        <div class="lg:col-span-8">
            <!-- Hero Banner -->
            <div th:if="${blog.thumbnail != null}" class="relative w-full aspect-[21/9] rounded-[2rem] overflow-hidden mb-10 shadow-sm border border-zinc-200/50">
                <img th:src="@{'/uploads/' + ${blog.thumbnail}}" alt="Blog Thumbnail" class="w-full h-full object-cover">
            </div>
            
            <!-- Meta Header -->
            <div class="mb-10">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-zinc-200 bg-white text-xs font-medium text-zinc-600 shadow-sm mb-4">
                    <i class="ph ph-tag text-zinc-900"></i> <span th:text="${blog.categoryName}">Danh mục</span>
                </div>
                
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-zinc-900 leading-tight mb-8" th:text="${blog.title}">
                    Title
                </h1>
                
                <div class="flex items-center justify-between py-6 border-y border-zinc-200/50">
                    <div class="flex items-center gap-4">
                        <img th:src="@{'/uploads/' + ${blog.authorAvatarUrl}}" alt="Author Avatar" class="w-12 h-12 rounded-full object-cover border border-zinc-200/50">
                        <div>
                            <div class="font-bold text-zinc-900" th:text="${blog.authorName}">Tác giả</div>
                            <div class="text-sm font-medium text-zinc-500" th:text="${#temporals.format(blog.createdAt, 'dd/MM/yyyy')}">Ngày đăng</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-10 h-10 rounded-full bg-white border border-zinc-200/50 flex items-center justify-center text-zinc-600 hover:bg-zinc-900 hover:text-white transition-colors shadow-sm"><i class="ph ph-share-network"></i></button>
                        <button class="w-10 h-10 rounded-full bg-white border border-zinc-200/50 flex items-center justify-center text-zinc-600 hover:bg-zinc-900 hover:text-white transition-colors shadow-sm"><i class="ph ph-bookmark-simple"></i></button>
                    </div>
                </div>
            </div>
            
            <!-- Typography Body -->
            <article class="prose prose-zinc prose-lg md:prose-xl max-w-none prose-headings:font-bold prose-img:rounded-2xl prose-a:text-blue-600">
                <div th:utext="${blog.content}">Nội dung bài viết</div>
            </article>
        </div>
        
        <!-- Sidebar (4 cols) -->
        <aside class="lg:col-span-4 space-y-8">
            <div class="bg-white rounded-[2rem] border border-zinc-200/50 p-8 shadow-sm sticky top-8">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl font-bold tracking-tight text-zinc-900">Bài Viết Mới</h3>
                    <i class="ph ph-newspaper text-zinc-400 text-xl"></i>
                </div>
                
                <div class="space-y-6">
                    <div class="group flex gap-4" th:each="latestBlog : ${latestBlogs}">
                        <a th:href="@{'/blogs/' + ${latestBlog.id}}" class="shrink-0 overflow-hidden rounded-2xl w-20 h-20 bg-zinc-100 block">
                            <img th:src="@{'/uploads/' + ${latestBlog.thumbnail}}" alt="Thumbnail" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </a>
                        <div class="flex flex-col justify-center">
                            <a th:href="@{'/blogs/' + ${latestBlog.id}}" class="font-bold text-zinc-900 group-hover:text-blue-600 transition-colors line-clamp-2 leading-snug mb-2 !no-underline" th:text="${latestBlog.title}">Tiêu đề bài viết gợi ý</a>
                            <p class="text-xs font-medium text-zinc-500 flex items-center gap-1">
                                <i class="ph ph-clock"></i> <span th:text="${#temporals.format(latestBlog.createdAt, 'dd/MM/yyyy')}">Ngày đăng</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{components/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
